# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: esmini profiling

on:
  push:
    branches: ['**']
  workflow_dispatch:

env:
  esmini_repo: esmini/esmini
  esmini_branch: dev
  samply_repo: mstange/samply
  samply_branch: bccaae62b8fbbdb69dd1352accad1b92a1502f29
  scenarios: "resources/xosc/cut-in.xosc, resources/xosc/highway_merge.xosc, resources/xosc/follow_ghost.xosc"

jobs:
  profiling:
    strategy:
      matrix:
        configuration: [RelWithDebInfo]
        os: [ubuntu-22.04]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout esmini
      uses: actions/checkout@v4
      with:
        repository: ${{ env.esmini_repo }}
        ref: ${{ env.esmini_branch }}
        submodules: true
        fetch-depth: 0

    - name: Cache externals/resources
      id: cache_externals
      uses: actions/cache@v4
      with:
        path: |
          externals/googletest
          externals/osg
          externals/osi
          externals/sumo
          resources/models
        key: ${{ runner.os }}-external-resources-v1
        restore-keys: |
          ${{ runner.os }}-external-resources-

    - name: Setup dependencies
      uses: ./.github/actions/setup_tools_shared

    - name: CMake Configure - Ubuntu
      if: runner.os == 'Linux'
      shell: bash
      run: cmake . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DUSE_OSI=ON -DUSE_GTEST=OFF -DUSE_OSG=ON -DUSE_SUMO=OFF -DUSE_IMPLOT=OFF -DBUILD_EXAMPLES=OFF

    - name: CMake Build
      run: cmake --build build --config ${{ matrix.configuration }} --target esmini -j 2

    - name: Checkout samply
      uses: actions/checkout@v4
      with:
        repository: ${{ env.samply_repo }}
        ref: ${{ env.samply_branch }}
        submodules: false
        fetch-depth: 0
        path: samply

    - name: Cache samply binary
      id: cache_samply_bin
      uses: actions/cache@v4
      with:
        path: samply/target/release/samply
        key: ${{ runner.os }}-samply-bin-${{ env.samply_branch }}

    - name: Build samply
      if: steps.cache_samply_bin.outputs.cache-hit != 'true'
      shell: bash
      working-directory: samply
      run: cargo build --release

    - name: Configure linux to allow perf event
      shell: bash
      run: echo '-1' | sudo tee /proc/sys/kernel/perf_event_paranoid

    - name: Run scenario to prepare call stack
      shell: bash
      run: ./build/EnvironmentSimulator/Applications/esmini --osc resources/xosc/cut-in.xosc --fixed_timestep 0.025 --osi_file --record sim.dat --headless

    - name: Run profiling
      shell: bash
      working-directory: samply
      run: |
        set -euo pipefail
        mkdir -p profiles
        scenarios='${{ env.scenarios }}'
        scenarios="${scenarios#[}"
        scenarios="${scenarios%]}"
        IFS=',' read -ra items <<< "$scenarios"
        for s in "${items[@]}"; do
          scenario="$(echo "$s" | xargs)"
          name="$(basename "$scenario" .xosc)"
          ./target/release/samply record --save-only -o "profiles/${name}.json" --presymbolicate --symbol-dir=../build/EnvironmentSimulator/Applications/esmini ../build/EnvironmentSimulator/Applications/esmini/esmini --osc "../$scenario" --fixed_timestep 0.025 --osi_file ../ground_truth.gt --record ../sim.dat --headless
          gzip -f "profiles/${name}.json"
        done

    - name: Upload profiling results
      id: publish_profile
      shell: bash
      working-directory: samply
      run: |
        set -euo pipefail
        published=0
        failed=0
        echo "## Profiling links" > profiles/profiler-links.md
        for f in profiles/*.json.gz; do
          name="$(basename "$f" .json.gz)"
          rsp="$(curl -fsS -X POST --data-binary @"$f" -H 'Accept: application/vnd.firefox-profiler+json;version=1.0' https://api.profiler.firefox.com/compressed-store || true)"
          token="$(printf '%s' "$rsp" | sed -n 's/.*"profileToken":"\([^"]*\)".*/\1/p' | head -n1)"
          if [[ -z "$token" ]]; then
            payload="$(printf '%s' "$rsp" | cut -d'.' -f2 | tr '_-' '/+')"
            while (( ${#payload} % 4 != 0 )); do payload+="="; done
            decoded="$(printf '%s' "$payload" | base64 -d 2>/dev/null || true)"
            token="$(printf '%s' "$decoded" | sed -n 's/.*"profileToken":"\([^"]*\)".*/\1/p' | head -n1)"
          fi
          if [[ -n "$token" ]]; then
            echo "- [$name](https://profiler.firefox.com/public/$token)" >> profiles/profiler-links.md
            published=$((published + 1))
          else
            echo "- $name (publish failed)" >> profiles/profiler-links.md
            failed=$((failed + 1))
          fi
        done
        echo "published=$published" >> "$GITHUB_OUTPUT"
        echo "failed=$failed" >> "$GITHUB_OUTPUT"

    - name: Upload Firefox profile artifact
      id: upload_profile
      uses: actions/upload-artifact@v4
      with:
        name: firefox-profiles
        path: |
          samply/profiles/*.json.gz
          samply/profiles/profiler-links.md
        if-no-files-found: error

    - name: Publish links
      shell: bash
      run: |
        cat samply/profiles/profiler-links.md >> "$GITHUB_STEP_SUMMARY"
        cat >> "$GITHUB_STEP_SUMMARY" <<EOF

        Published: ${{ steps.publish_profile.outputs.published }}, Failed: ${{ steps.publish_profile.outputs.failed }}
        - [Download uploaded profile artifact](${{ steps.upload_profile.outputs.artifact-url }})
        EOF


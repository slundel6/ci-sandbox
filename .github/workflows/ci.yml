# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: Build Protobuf on multiple platforms

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-22.04, macos-14]
        build_type: [Release, Debug]
        protobuf_shared: [ON, OFF]

    steps:
    - uses: actions/checkout@v4

    - uses: ./.github/actions/setup_tools_shared

    - name: Build protobuf
      id: build_step
      continue-on-error: true
      shell: bash
      env:
        BUILD_TYPE: ${{ matrix.build_type }}
        PROTOBUF_SHARED: ${{ matrix.protobuf_shared }}
      run: |
        ./build_protobuf.sh

    # - name: Debugging with tmate
    #   if: ${{ always() && matrix.os == 'windows-2022' && steps.build_step.outcome == 'failure' }}
    #   uses: mxschmitt/action-tmate@v3

    - name: Bundle platform package
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          ubuntu-22.04) ARCHIVE_NAME="osi-linux.tar.xz" ; FOLDER_NAME="linux" ;;
          macos-14)    ARCHIVE_NAME="osi-macos.tar.xz" ; FOLDER_NAME="mac" ;;
          windows-2022) ARCHIVE_NAME="osi-windows.tar.xz" ; FOLDER_NAME="v10" ;;
        esac

        tar -cJvf "$ARCHIVE_NAME" "$FOLDER_NAME"
        echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ARCHIVE_NAME }}
        path: ${{ env.ARCHIVE_NAME }}

    - name: Fail job if build failed
      if: ${{ steps.build_step.outcome == 'failure' }}
      shell: bash
      run: |
        echo "Build step failed; preserving failed job status after optional tmate session."
        exit 1

